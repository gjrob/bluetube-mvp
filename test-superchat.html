<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueTubeTV - Test SuperChat 🌊</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #00c9ff 0%, #92fe9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            opacity: 0.9;
            font-size: 0.9em;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        input:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #92fe9d;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00c9ff 0%, #92fe9d 100%);
            border: none;
            border-radius: 10px;
            color: #333;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: rgba(146, 254, 157, 0.2);
            border: 1px solid #92fe9d;
            display: block;
        }
        
        .status.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff6b6b;
            display: block;
        }
        
        .status.info {
            background: rgba(0, 201, 255, 0.2);
            border: 1px solid #00c9ff;
            display: block;
        }
        
        .contract-info {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            word-break: break-all;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #92fe9d;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BlueTubeTV SuperChat 🌊</h1>
        <p class="subtitle">Test Your Blockchain Payment System!</p>
        
        <div class="contract-info">
            📋 Contract: <span id="contractAddress">Not Set</span><br>
            🌐 Network: Sepolia Testnet<br>
            💰 Your Address: <span id="userAddress">Not Connected</span>
        </div>
        
        <div class="input-group">
            <label>Contract Address</label>
            <input type="text" id="contractInput" placeholder="0x..." value="">
        </div>
        
        <div class="input-group">
            <label>Creator Address (who receives the SuperChat)</label>
            <input type="text" id="creatorAddress" placeholder="0x..." value="">
        </div>
        
        <div class="input-group">
            <label>Amount (ETH)</label>
            <input type="number" id="amount" step="0.001" min="0.001" value="0.001" placeholder="0.001">
        </div>
        
        <div class="input-group">
            <label>Message</label>
            <textarea id="message" rows="3" placeholder="Your message to the creator...">Testing BlueTubeTV SuperChat! 🚀</textarea>
        </div>
        
        <button onclick="connectWallet()" id="connectBtn">Connect MetaMask</button>
        <button onclick="sendSuperChat()" id="sendBtn" style="display:none">Send SuperChat 💎</button>
        <button onclick="checkBalances()" id="checkBtn" style="display:none">Check Contract Stats 📊</button>
        
        <div id="status" class="status"></div>
        
        <div class="stats" id="stats" style="display:none">
            <div class="stat-card">
                <div class="stat-value" id="platformFees">0 ETH</div>
                <div class="stat-label">Platform Fees (Your Earnings)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="creatorBalance">0 ETH</div>
                <div class="stat-label">Creator Balance</div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR CONTRACT ADDRESS HERE!
        const DEFAULT_CONTRACT = "0xD699d61Ce1554d4f7ef4b853283845F354f8a9Db";

        const SUPERCHAT_ABI = [
            "function sendSuperChat(address _creator, string memory _message) public payable",
            "function withdrawCreatorBalance() public",
            "function withdrawPlatformFees() public",
            "function getCreatorBalance(address _creator) public view returns (uint256)",
            "function creatorBalances(address) public view returns (uint256)",
            "function totalPlatformFees() public view returns (uint256)",
            "function platformFeePercent() public view returns (uint256)",
            "function owner() public view returns (address)",
            "event SuperChatSent(address indexed sender, address indexed creator, uint256 amount, string message, uint256 timestamp)"
        ];
        
        let provider, signer, contract;
        
        window.onload = async () => {
            if (DEFAULT_CONTRACT) {
                document.getElementById('contractInput').value = DEFAULT_CONTRACT;
                document.getElementById('contractAddress').textContent = DEFAULT_CONTRACT.slice(0, 6) + '...' + DEFAULT_CONTRACT.slice(-4);
            }
            
            // Auto-fill creator address with user's address for testing
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    document.getElementById('creatorAddress').value = accounts[0];
                }
            }
        };
        
        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    showStatus('Please install MetaMask!', 'error');
                    return;
                }
                
                showStatus('Connecting to MetaMask...', 'info');
                
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // Check network
                const network = await provider.getNetwork();
                if (network.chainId !== 11155111) {
                    showStatus('Please switch to Sepolia testnet!', 'error');
                    return;
                }
                
                signer = provider.getSigner();
                const address = await signer.getAddress();
                
                document.getElementById('userAddress').textContent = address.slice(0, 6) + '...' + address.slice(-4);
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('sendBtn').style.display = 'block';
                document.getElementById('checkBtn').style.display = 'block';
                
                // Set up contract
                const contractAddress = document.getElementById('contractInput').value;
                if (contractAddress) {
                    contract = new ethers.Contract(contractAddress, SUPERCHAT_ABI, signer);
                    showStatus('Connected! Ready to send SuperChats!', 'success');
                    
                    // Auto-fill creator with own address for testing
                    if (!document.getElementById('creatorAddress').value) {
                        document.getElementById('creatorAddress').value = address;
                    }
                }
                
            } catch (error) {
                console.error(error);
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        async function sendSuperChat() {
            try {
                const contractAddress = document.getElementById('contractInput').value;
                if (!contractAddress) {
                    showStatus('Please enter your contract address!', 'error');
                    return;
                }
                
                if (!contract) {
                    contract = new ethers.Contract(contractAddress, SUPERCHAT_ABI, signer);
                }
                
                const creatorAddress = document.getElementById('creatorAddress').value;
                const amount = document.getElementById('amount').value;
                const message = document.getElementById('message').value;
                
                if (!creatorAddress || !amount || !message) {
                    showStatus('Please fill all fields!', 'error');
                    return;
                }
                
                showStatus('Sending SuperChat... Please confirm in MetaMask', 'info');
                
                const tx = await contract.sendSuperChat(
                    creatorAddress,
                    message,
                    { value: ethers.utils.parseEther(amount) }
                );
                
                showStatus('Transaction sent! Waiting for confirmation...', 'info');
                
                await tx.wait();
                
                showStatus(`✅ SuperChat sent! TX: ${tx.hash.slice(0, 10)}...`, 'success');
                
                // Update stats
                checkBalances();
                
            } catch (error) {
                console.error(error);
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        async function checkBalances() {
            try {
                const contractAddress = document.getElementById('contractInput').value;
                if (!contractAddress) {
                    showStatus('Please enter your contract address!', 'error');
                    return;
                }
                
                if (!contract) {
                    contract = new ethers.Contract(contractAddress, SUPERCHAT_ABI, signer);
                }
                
                showStatus('Checking contract stats...', 'info');
                
                // Get platform fees
                const platformFees = await contract.totalPlatformFees();
                document.getElementById('platformFees').textContent = ethers.utils.formatEther(platformFees) + ' ETH';
                
                // Get creator balance
                const creatorAddress = document.getElementById('creatorAddress').value;
                if (creatorAddress) {
                    const creatorBalance = await contract.creatorBalances(creatorAddress);
                    document.getElementById('creatorBalance').textContent = ethers.utils.formatEther(creatorBalance) + ' ETH';
                }
                
                // Get owner
                const owner = await contract.owner();
                const userAddress = await signer.getAddress();
                
                document.getElementById('stats').style.display = 'grid';
                
                if (owner.toLowerCase() === userAddress.toLowerCase()) {
                    showStatus('✅ You are the contract owner! You earn 5% from all SuperChats!', 'success');
                } else {
                    showStatus('Contract stats loaded!', 'success');
                }
                
            } catch (error) {
                console.error(error);
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
